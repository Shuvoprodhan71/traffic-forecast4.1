<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traffic Forecasting System — METR-LA</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

  <style>
    body { background: #0f1117; color: #e0e0e0; font-family: "Segoe UI", sans-serif; }
    #map { height: 480px; border-radius: 12px; border: 1px solid #2a2d3e; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px; }
    .card-header { background: #12151f; border-bottom: 1px solid #2a2d3e; font-weight: 600; }
    .form-select, .form-control {
      background: #12151f; color: #e0e0e0; border: 1px solid #2a2d3e;
    }
    .form-select:focus, .form-control:focus {
      background: #12151f; color: #e0e0e0; border-color: #4e6ef2; box-shadow: none;
    }
    .btn-primary { background: #4e6ef2; border-color: #4e6ef2; }
    .btn-primary:hover { background: #3a57d4; border-color: #3a57d4; }
    .speed-display {
      font-size: 3.5rem; font-weight: 700; color: #4e6ef2; line-height: 1;
    }
    .sensor-marker { cursor: pointer; }
    #chartContainer { position: relative; height: 220px; }
    .stat-box {
      background: #12151f; border-radius: 8px; padding: 12px 16px;
      border: 1px solid #2a2d3e; text-align: center;
    }
    .stat-box .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
    .stat-box .value { font-size: 1.4rem; font-weight: 700; color: #e0e0e0; }
    .model-btn { min-width: 130px; }
    .leaflet-popup-content-wrapper { background: #1a1d2e; color: #e0e0e0; border: 1px solid #2a2d3e; }
    .leaflet-popup-tip { background: #1a1d2e; }
  </style>
</head>
<body>

<div class="container-fluid py-4 px-4">

  <!-- Header -->
  <div class="mb-4">
    <h2 class="fw-bold mb-0">🚦 Traffic Speed Forecasting</h2>
    <p class="text-muted mb-0">METR-LA Dataset · 207 Sensors · Los Angeles</p>
  </div>

  <div class="row g-4">

    <!-- Left column: Map + controls -->
    <div class="col-lg-7">
      <div class="card mb-4">
        <div class="card-header">📍 Sensor Map — Click a sensor or use the dropdown</div>
        <div class="card-body p-2">
          <div id="map"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">⚙️ Prediction Controls</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label text-muted small">Sensor ID</label>
              <select id="sensorSelect" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small">Model</label>
              <div class="d-flex gap-2">
                <button id="btnLSTM" class="btn btn-primary model-btn active" onclick="selectModel('LSTM' )">LSTM</button>
                <button id="btnRF"   class="btn btn-outline-secondary model-btn"  onclick="selectModel('Random Forest')">Random Forest</button>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label text-muted small">Last 12 Speed Readings (mph) — comma separated</label>
              <input type="text" id="speedInput" class="form-control"
                placeholder="e.g. 55,58,60,57,52,48,45,47,50,53,55,58"/>
            </div>
            <div class="col-12">
              <button class="btn btn-primary w-100 py-2" onclick="runPrediction()">
                ▶ Predict Next Speed
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right column: Results -->
    <div class="col-lg-5">

      <!-- Prediction result -->
      <div class="card mb-4">
        <div class="card-header">📊 Prediction Result</div>
        <div class="card-body text-center py-4">
          <div class="speed-display mb-2" id="predSpeed">--</div>
          <div class="text-muted mb-3">mph (predicted next 5 min)</div>
          <span id="conditionBadge" class="badge fs-6 px-4 py-2">--</span>
          <hr class="my-3" style="border-color:#2a2d3e"/>
          <div class="row g-2">
            <div class="col-4">
              <div class="stat-box">
                <div class="label">Sensor</div>
                <div class="value" id="statSensor">--</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-box">
                <div class="label">Model</div>
                <div class="value" id="statModel">--</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-box">
                <div class="label">Avg Input</div>
                <div class="value" id="statAvg">--</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="card-header">📈 Speed History + Forecast</div>
        <div class="card-body">
          <div id="chartContainer">
            <canvas id="speedChart"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let sensors      = {};
let selectedId   = null;
let selectedModel = "LSTM";
let map, markers = {}, chart;

// ── Init map ─────────────────────────────────────────────────────────────────
function initMap( ) {
  map = L.map("map").setView([34.05, -118.25], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18
  } ).addTo(map);
}

// ── Load sensors ─────────────────────────────────────────────────────────────
async function loadSensors() {
  const res  = await fetch("/api/sensors");
  sensors    = await res.json();
  const sel  = document.getElementById("sensorSelect");

  Object.entries(sensors).forEach(([id, info]) => {
    // Dropdown
    const opt  = document.createElement("option");
    opt.value  = id;
    opt.text   = `Sensor ${id}`;
    sel.appendChild(opt);

    // Map marker
    const lat = info.lat ?? info.latitude  ?? info[0];
    const lon = info.lon ?? info.longitude ?? info[1];
    if (lat == null || lon == null) return;

    const dot = L.circleMarker([lat, lon], {
      radius: 5, color: "#4e6ef2", fillColor: "#4e6ef2",
      fillOpacity: 0.8, weight: 1
    }).addTo(map);

    dot.bindPopup(`<b>Sensor ${id}</b>  
Lat: ${lat.toFixed(4)}  
Lon: ${lon.toFixed(4)}`);
    dot.on("click", () => {
      selectSensor(id);
      dot.openPopup();
    });
    markers[id] = dot;
  });

  // Select first sensor
  const firstId = Object.keys(sensors)[0];
  if (firstId) selectSensor(firstId);
}

// ── Select sensor ─────────────────────────────────────────────────────────────
function selectSensor(id) {
  selectedId = id;
  document.getElementById("sensorSelect").value = id;

  // Reset marker colours
  Object.values(markers).forEach(m => m.setStyle({ color: "#4e6ef2", fillColor: "#4e6ef2" }));
  if (markers[id]) markers[id].setStyle({ color: "#ff4757", fillColor: "#ff4757" });

  // Populate a realistic default input
  const base  = 45 + Math.random() * 20;
  const vals  = Array.from({length: 12}, (_, i) =>
    Math.round(Math.max(5, base + (Math.random() - 0.5) * 10))
  );
  document.getElementById("speedInput").value = vals.join(",");
  document.getElementById("statSensor").textContent = id;
}

// ── Select model ──────────────────────────────────────────────────────────────
function selectModel(m) {
  selectedModel = m;
  document.getElementById("btnLSTM").className =
    m === "LSTM" ? "btn btn-primary model-btn" : "btn btn-outline-secondary model-btn";
  document.getElementById("btnRF").className =
    m === "Random Forest" ? "btn btn-primary model-btn" : "btn btn-outline-secondary model-btn";
}

// ── Run prediction ────────────────────────────────────────────────────────────
async function runPrediction() {
  if (!selectedId) { alert("Please select a sensor first."); return; }

  const raw    = document.getElementById("speedInput").value;
  const speeds = raw.split(",").map(s => parseFloat(s.trim())).filter(v => !isNaN(v));

  if (speeds.length !== 12) {
    alert("Please enter exactly 12 comma-separated speed values.");
    return;
  }

  const btn = document.querySelector("button[onclick='runPrediction()']");
  btn.disabled    = true;
  btn.textContent = "⏳ Predicting...";

  try {
    const res  = await fetch("/api/predict", {
      method:  "POST",
      headers: {"Content-Type": "application/json"},
      body:    JSON.stringify({
        sensor_id:  selectedId,
        model:      selectedModel,
        speeds:     speeds,
        time_step:  Math.floor(Date.now() / 300000) % 288
      })
    });

    const data = await res.json();
    if (data.error) { alert("Error: " + data.error); return; }

    // Update UI
    document.getElementById("predSpeed").textContent = data.predicted_speed.toFixed(1);
    document.getElementById("statModel").textContent =
      selectedModel === "LSTM" ? "LSTM" : "RF";
    document.getElementById("statAvg").textContent =
      (speeds.reduce((a,b) => a+b, 0) / speeds.length).toFixed(1);

    const badge = document.getElementById("conditionBadge");
    badge.textContent  = data.condition;
    badge.className    = `badge fs-6 px-4 py-2 bg-${data.badge}`;

    updateChart(speeds, data.predicted_speed);

  } catch(e) {
    alert("Request failed: " + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = "▶ Predict Next Speed";
  }
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function updateChart(history, prediction) {
  const labels = history.map((_, i) => `-${(12-i)*5}min`).concat(["Next"]);
  const hist   = [...history, null];
  const fore   = [...Array(12).fill(null), prediction];

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("speedChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label:           "History (mph)",
          data:            hist,
          borderColor:     "#4e6ef2",
          backgroundColor: "rgba(78,110,242,0.1)",
          tension:         0.4,
          fill:            true,
          pointRadius:     3,
          spanGaps:        false
        },
        {
          label:           "Forecast (mph)",
          data:            fore,
          borderColor:     "#ff6b6b",
          backgroundColor: "rgba(255,107,107,0.15)",
          borderDash:      [6, 3],
          tension:         0.4,
          fill:            true,
          pointRadius:     6,
          pointBackgroundColor: "#ff6b6b",
          spanGaps:        false
        }
      ]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#e0e0e0" } } },
      scales: {
        x: { ticks: { color: "#888" }, grid: { color: "#1e2130" } },
        y: {
          ticks:  { color: "#888" },
          grid:   { color: "#1e2130" },
          title:  { display: true, text: "Speed (mph)", color: "#888" }
        }
      }
    }
  });
}

// ── Dropdown change ───────────────────────────────────────────────────────────
document.getElementById("sensorSelect").addEventListener("change", function() {
  selectSensor(this.value);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
initMap();
loadSensors();
</script>

</body>
</html>
